name: Release

# Publishes the extension when a version tag (v*) is pushed.
# Required repository secret (Settings -> Secrets and variables -> Actions):
#   VSCE_PAT  Azure DevOps PAT with "Marketplace > Manage" scope (VS Code Marketplace).
# Optional:
#   OVSX_PAT  Open VSX token; the Open VSX step is skipped when it is unset.
on:
  push:
    tags: ['v*']

permissions:
  contents: write # create the GitHub Release and upload the VSIX

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
      OVSX_PAT: ${{ secrets.OVSX_PAT }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      VSIX: markdown-video-audio-${{ github.ref_name }}.vsix
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Require VSCE_PAT
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "::error::VSCE_PAT secret is not set (Settings -> Secrets and variables -> Actions)." >&2
            exit 1
          fi

      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match package.json version $PKG." >&2
            exit 1
          fi

      - run: npm ci
      - run: npm run lint
      - run: npm test

      - name: Package VSIX
        run: npx vsce package --out "$VSIX"

      - name: Publish to VS Code Marketplace
        run: npx vsce publish --packagePath "$VSIX" -p "$VSCE_PAT"

      - name: Publish to Open VSX (optional)
        if: ${{ env.OVSX_PAT != '' }}
        run: npx ovsx publish "$VSIX" -p "$OVSX_PAT"

      - name: Create GitHub Release
        run: gh release create "$GITHUB_REF_NAME" "$VSIX" --title "$GITHUB_REF_NAME" --generate-notes
