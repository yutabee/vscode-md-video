name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {}

permissions:
  contents: read

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR branch).
# The release workflow is separate and is never cancelled mid-publish.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          # Pinned to a concrete major for reproducible builds; lts/* drifts as
          # new LTS lines are promoted. Bump deliberately — this CI job gates it.
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run lint
      - run: npm test
      # Guard the packaging manifest (activationEvents, .vscodeignore) so a VSIX
      # stays buildable; lists files without producing an artifact.
      - run: npx vsce ls
