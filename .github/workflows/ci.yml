name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run lint
      - run: npm test
      # Guard the packaging manifest (activationEvents, .vscodeignore) so a VSIX
      # stays buildable; lists files without producing an artifact.
      - run: npx vsce ls
